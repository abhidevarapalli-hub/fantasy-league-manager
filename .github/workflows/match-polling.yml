name: Match Polling

on:
  schedule:
    # Lifecycle check — find upcoming matches and enable polling (every 5 min)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - lifecycle-only
          - poll-only

jobs:
  lifecycle-check:
    name: Lifecycle Check
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'both' ||
      github.event.inputs.job == 'lifecycle-only'
    steps:
      - name: Call match-lifecycle-manager
        run: |
          curl -s -f -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/match-lifecycle-manager" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"lookahead_minutes": 30}'

  poll-live-matches:
    name: Poll Live Matches
    runs-on: ubuntu-latest
    # Always run poll-trigger (lifecycle may have just activated new matches)
    needs: lifecycle-check
    if: >-
      always() &&
      (github.event_name == 'schedule' ||
       github.event.inputs.job == 'both' ||
       github.event.inputs.job == 'poll-only')
    steps:
      - name: Call poll-trigger
        run: |
          curl -s -f -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/poll-trigger" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
